<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch 003 — Today's bar</title>
<link rel="stylesheet" href="../themes/default.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--bg-gradient);color:var(--text-primary)}
  .toolbar{display:flex;gap:8px;align-items:center;font:12px monospace;color:var(--text-secondary);padding:8px 14px;background:var(--bg-panel);border-bottom:1px solid var(--border-color)}
  .toolbar button{font:inherit;padding:6px 10px;border-radius:8px;cursor:pointer;border:1px solid var(--border-color);background:var(--bg-card);color:var(--text-primary)}
  .toolbar button.on{background:var(--primary);border-color:var(--primary);color:#fff}

  .app{display:grid;grid-template-columns:300px 1fr;height:100vh}

  /* ===== Today's bar (sidebar) ===== */
  .today{display:flex;flex-direction:column;background:rgba(var(--primary-rgb),0.03);border-right:1px solid var(--border-color);overflow:hidden}
  .today-head{padding:16px 16px 12px;border-bottom:1px solid var(--border-color)}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--accent-cyan));color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center}
  .brand h1{font-family:var(--font-title);font-size:1.05rem}
  .today-date{font-size:.8rem;color:var(--text-muted);font-weight:600}
  .today-date b{color:var(--text-primary)}

  .slots{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-height:0;padding:8px}
  .slot{flex:1 1 0;min-height:22px;display:flex;align-items:stretch;gap:8px;padding:3px 0;border-radius:8px}
  .slot-time{flex:0 0 64px;font-size:.7rem;color:var(--text-muted);font-weight:600;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .slot-drop{flex:1;border:1px dashed transparent;border-radius:8px;display:flex;align-items:center;min-width:0}
  .slot.empty .slot-drop{border-color:var(--border-color);background:rgba(var(--primary-rgb),0.02)}
  .slot.empty .slot-drop::after{content:'';}
  .slot.over .slot-drop{border-color:var(--primary);border-style:dashed;background:rgba(var(--primary-rgb),0.08)}

  .chip{flex:1;display:flex;align-items:center;gap:8px;min-width:0;height:100%;padding:6px 10px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border-color);border-left:3px solid var(--cat,#6366f1);box-shadow:var(--shadow-sm);cursor:grab}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--cat,#6366f1);flex-shrink:0}
  .chip .t{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .chip .x{opacity:0;color:var(--text-muted);cursor:pointer;flex-shrink:0;font-size:1rem}
  .chip:hover .x{opacity:1}
  .chip.done{opacity:.6}
  .chip.done .t{text-decoration:line-through}
  .chip.done::before{content:'\2713';color:hsl(var(--priority-low-hue),60%,42%);font-weight:800;flex-shrink:0}

  /* Variant B: stacked time above chip */
  .v-b .slot{flex-direction:column;gap:2px;padding:4px 2px}
  .v-b .slot-time{flex:0 0 auto;justify-content:flex-start;padding-right:0}
  .v-b .slot-drop{width:100%}
  .v-b .chip{height:auto}

  /* ===== main ===== */
  .main{display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:12px;padding:12px 22px;background:var(--bg-panel);border-bottom:1px solid var(--border-color)}
  .topbar h2{font-family:var(--font-title);font-size:1.05rem;flex:1}
  .tb-icon{width:36px;height:36px;border-radius:9px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-secondary);display:flex;align-items:center;justify-content:center}
  .tb-add{display:flex;align-items:center;gap:6px;padding:8px 14px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--accent-purple));color:#fff;font-weight:600}
  .tb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent-purple));color:#fff;font-weight:700;border:none}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:12px 22px;border-bottom:1px solid var(--border-color)}
  .cchip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:999px;border:1px solid var(--border-color);background:var(--bg-card);font-size:.8rem;font-weight:600;color:var(--text-secondary)}
  .cchip.on{background:var(--primary);color:#fff}
  .cchip .cc{font-size:.7rem;background:var(--bg-input);padding:2px 7px;border-radius:999px}
  .board{flex:1;padding:18px 22px;overflow:auto}
  .matrix{display:grid;grid-template-columns:90px 1fr 1fr 1fr;gap:12px}
  .mh{font-size:.66rem;font-weight:700;text-transform:uppercase;color:var(--text-muted);text-align:center;align-self:center}
  .rl{font-family:var(--font-title);font-weight:700;font-size:.8rem;display:flex;align-items:center}
  .rl.high{color:hsl(var(--priority-high-hue),70%,52%)}.rl.med{color:hsl(var(--priority-medium-hue),80%,42%)}.rl.low{color:hsl(var(--priority-low-hue),55%,38%)}
  .cell{min-height:120px;border:1px solid var(--border-color);border-radius:12px;background:rgba(var(--primary-rgb),0.015);padding:10px;display:flex;flex-direction:column;gap:8px}
  .card{background:var(--bg-card);border:1px solid var(--border-color);border-left:3px solid var(--cat,#6366f1);border-radius:10px;padding:10px;box-shadow:var(--shadow-sm);cursor:grab}
  .card .ct{font-size:.85rem;font-weight:600}
  .card .cm{font-size:.7rem;color:var(--text-muted);margin-top:3px}
</style>
</head>
<body>
  <div class="toolbar">
    <span>Sketch 003 — Today's bar →</span>
    <button onclick="setv('a')" id="v-a" class="on">★ A · time gutter</button>
    <button onclick="setv('b')" id="v-b">B · stacked</button>
    <span style="margin-left:10px">theme →</span>
    <button onclick="tt()" id="thb">light</button>
  </div>

  <div class="app v-a" id="app">
    <!-- Today's bar -->
    <aside class="today">
      <div class="today-head">
        <div class="brand"><div class="logo">♚</div><h1>Checkmate</h1></div>
        <div class="today-date">Today · <b>Sun, Jun 8</b></div>
      </div>
      <div class="slots" id="slots"></div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="topbar">
        <h2>Task Dashboard</h2>
        <button class="tb-icon"><i class="ri-smartphone-line"></i></button>
        <button class="tb-icon" onclick="tt()"><i class="ri-moon-line" id="thi"></i></button>
        <button class="tb-add"><i class="ri-add-fill"></i> Add Task</button>
        <button class="tb-av">N</button>
      </div>
      <div class="chips">
        <span class="cchip on">All <span class="cc">20</span></span>
        <span class="cchip">Work <span class="cc">8</span></span>
        <span class="cchip">Personal <span class="cc">5</span></span>
        <span class="cchip">Fitness <span class="cc">3</span></span>
        <span class="cchip">Home <span class="cc">4</span></span>
      </div>
      <div class="board">
        <div class="matrix">
          <div class="mh">Pri / Status</div><div class="mh">To Do</div><div class="mh">In Prog</div><div class="mh">Done</div>
          <div class="rl high">High</div>
          <div class="cell"><div class="card" style="--cat:#6366f1"><div class="ct">Ship redesign</div><div class="cm">Work · 06/08</div></div><div class="card" style="--cat:#ec4899"><div class="ct">Call dentist</div><div class="cm">Personal</div></div></div>
          <div class="cell"></div><div class="cell"></div>
          <div class="rl med">Med</div>
          <div class="cell"><div class="card" style="--cat:#10b981"><div class="ct">Gym session</div><div class="cm">Fitness</div></div></div>
          <div class="cell"></div><div class="cell"></div>
          <div class="rl low">Low</div>
          <div class="cell"><div class="card" style="--cat:#06b6d4"><div class="ct">Tidy desk</div><div class="cm">Home</div></div></div>
          <div class="cell"></div><div class="cell"></div>
        </div>
      </div>
    </main>
  </div>

<script>
  // Build 8:00 AM -> 11:00 PM, 30-min slots (flex-fill, no scroll on tall screens)
  const filled = { '08:00':{t:'Deep work: ship redesign',cat:'#6366f1'}, '09:30':{t:'Standup',cat:'#6366f1',done:true}, '10:00':{t:'Gym session',cat:'#10b981'}, '12:30':{t:'Lunch + walk',cat:'#06b6d4'}, '15:00':{t:'Call dentist',cat:'#ec4899'} };
  const over = '11:00'; // show one drag-over slot
  function fmt(h,m){ const ap=h<12?'AM':'PM'; let hh=h%12; if(hh===0)hh=12; return hh+':'+(m===0?'00':'30')+' '+ap; }
  function key(h,m){ return String(h).padStart(2,'0')+':'+(m===0?'00':'30'); }
  function build(){
    const s=document.getElementById('slots'); s.innerHTML='';
    for(let h=8;h<=23;h++){ for(const m of [0,30]){ if(h===23&&m===30)break;
      const k=key(h,m); const row=document.createElement('div'); row.className='slot';
      const f=filled[k];
      let drop='';
      if(f){ drop=`<div class="slot-drop"><div class="chip${f.done?' done':''}" style="--cat:${f.cat}"><span class="dot"></span><span class="t">${f.t}</span><i class="ri-close-line x"></i></div></div>`; }
      else { row.classList.add('empty'); if(k===over) row.classList.add('over'); drop='<div class="slot-drop"></div>'; }
      row.innerHTML=`<div class="slot-time">${fmt(h,m)}</div>${drop}`;
      s.appendChild(row);
    }}
  }
  function setv(v){document.getElementById('app').className='app v-'+v;['a','b'].forEach(x=>document.getElementById('v-'+x).classList.toggle('on',x===v));}
  function tt(){const b=document.body,d=b.getAttribute('data-theme')==='dark';b.setAttribute('data-theme',d?'light':'dark');document.getElementById('thb').textContent=d?'light':'dark';document.getElementById('thi').className=d?'ri-moon-line':'ri-sun-line';}
  build();
  const q=new URLSearchParams(location.search); if(q.get('v'))setv(q.get('v')); if(q.get('t')==='dark')tt();
</script>
</body>
</html>
